events {}

http {
  upstream web {
    server web:3000;
  }

  upstream api {
    server api:4000;
  }

  server {
    listen 80;
    server_name 3.110.37.226.sslip.io 3.110.37.226.nip.io;

    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl http2;
    server_name 3.110.37.226.sslip.io 3.110.37.226.nip.io;

    ssl_certificate /etc/letsencrypt/live/3.110.37.226.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/3.110.37.226.sslip.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /api/ {
      proxy_pass http://api/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location / {
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }
}
